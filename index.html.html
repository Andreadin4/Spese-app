<!-- Le icone sono incluse come SVG direttamente nel codice dell'app: nessuna dipendenza esterna da qui in poi. -->

<style>
  html, body { margin: 0; padding: 0; background: #FAF7F2; overscroll-behavior-y: none; }
  #root { min-height: 100vh; min-height: 100dvh; }
  /* Schermata di attesa mentre React e Babel si caricano dal CDN la prima volta */
  #boot-loader {
    position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #FAF7F2; font-family: system-ui, sans-serif; color: #1C2321; gap: 12px; z-index: 9999;
  }
  #boot-loader.hidden { display: none; }
  .boot-spinner {
    width: 32px; height: 32px; border: 3px solid #E4EEEA; border-top-color: #2F6F5E; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="boot-loader">
  <div class="boot-spinner"></div>
  <div style="font-size: 14px; opacity: 0.6;">Caricamento…</div>
</div>

<div id="root"></div>

<!--
  Rete di sicurezza: se qualcosa va storto durante il caricamento (una libreria CDN
  che non risponde, un errore nel codice), mostriamo un messaggio leggibile invece
  di lasciare una pagina bianca senza nessuna indicazione di cosa non ha funzionato.
-->
<script>
  window.addEventListener("error", function (event) {
    const loader = document.getElementById("boot-loader");
    if (loader) loader.classList.add("hidden");
    const root = document.getElementById("root");
    if (root && !root.hasChildNodes()) {
      root.innerHTML =
        '<div style="padding: 32px 20px; font-family: system-ui, sans-serif; color: #1C2321; max-width: 480px; margin: 0 auto;">' +
        '<h2 style="font-size: 18px;">Qualcosa non ha funzionato nel caricamento</h2>' +
        '<p style="font-size: 14px; color: #8A8478; line-height: 1.5;">Controlla di avere connessione internet (serve solo la prima volta) e riprova a ricaricare la pagina. Se il problema persiste, dettaglio tecnico:</p>' +
        '<pre style="background: #F1EDE6; padding: 12px; border-radius: 8px; font-size: 12px; overflow-x: auto; white-space: pre-wrap;">' +
        (event.message || "Errore sconosciuto") +
        '</pre></div>';
    }
  });
</script>

const LOCAL_PREFIX = "spese-app:";
const localDB = {
  async get(key) {
    const raw = window.localStorage.getItem(LOCAL_PREFIX + key);
    if (raw === null) throw new Error("not found");
    return { key, value: raw };
  },
  async set(key, value) {
    window.localStorage.setItem(LOCAL_PREFIX + key, value);
    return { key, value };
  },
};

  return function Icon({ size = 24, color = "currentColor", strokeWidth = 2, style }) {
    return (
      <svg
        width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
        style={style}
      >
        {paths}
      </svg>
    );
  };
}

// ---------- Grafici: SVG disegnati a mano, nessuna dipendenza da Recharts ----------
// Coprono i tre casi usati dall'app: torta, barre (anche multi-serie), linee.
// Niente libreria esterna: zero rischio che un CDN di terze parti smetta di
// funzionare o cambi formato senza preavviso.

function formatEURShort(n) {
  // Versione compatta per le etichette degli assi (es. "1.2k €" invece di "1.234,56 €")
  if (Math.abs(n) >= 1000) return (n / 1000).toFixed(1).replace(".0", "") + "k";
  return Math.round(n).toString();
}

// ----- Grafico a torta con legenda (usato per "spese per categoria") -----
function SimplePieChart({ data, height = 220 }) {
  const [activeIndex, setActiveIndex] = useState(null);
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total <= 0 || data.length === 0) {
    return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: "#B8B2A8", fontSize: 13 }}>Nessun dato</div>;
  }

  const size = height;
  const cx = size / 2, cy = size / 2;
  const outerR = size * 0.38, innerR = size * 0.22;

  let cumulative = 0;
  const slices = data.map((d, i) => {
    const startAngle = (cumulative / total) * 2 * Math.PI - Math.PI / 2;
    cumulative += d.value;
    const endAngle = (cumulative / total) * 2 * Math.PI - Math.PI / 2;
    const largeArc = endAngle - startAngle > Math.PI ? 1 : 0;

    const x1o = cx + outerR * Math.cos(startAngle), y1o = cy + outerR * Math.sin(startAngle);
    const x2o = cx + outerR * Math.cos(endAngle), y2o = cy + outerR * Math.sin(endAngle);
    const x1i = cx + innerR * Math.cos(endAngle), y1i = cy + innerR * Math.sin(endAngle);
    const x2i = cx + innerR * Math.cos(startAngle), y2i = cy + innerR * Math.sin(startAngle);

    const path = `M ${x1o} ${y1o} A ${outerR} ${outerR} 0 ${largeArc} 1 ${x2o} ${y2o} L ${x1i} ${y1i} A ${innerR} ${innerR} 0 ${largeArc} 0 ${x2i} ${y2i} Z`;
    return { ...d, path, index: i };
  });

  const active = activeIndex !== null ? slices[activeIndex] : null;

  return (
    <div style={{ position: "relative" }}>
      <svg width="100%" height={height} viewBox={`0 0 ${size} ${size}`} style={{ display: "block", margin: "0 auto", maxWidth: size }}>
        {slices.map((s) => (
          <path
            key={s.index}
            d={s.path}
            fill={s.color}
            opacity={activeIndex === null || activeIndex === s.index ? 1 : 0.35}
            onClick={() => setActiveIndex(activeIndex === s.index ? null : s.index)}
            style={{ cursor: "pointer", transition: "opacity 0.15s" }}
          />
        ))}
        <text x={cx} y={cy - 4} textAnchor="middle" fontSize={size * 0.075} fontWeight="700" fill={INK} fontFamily="system-ui">
          {active ? formatEUR(active.value) : formatEUR(total)}
        </text>
        <text x={cx} y={cy + size * 0.09} textAnchor="middle" fontSize={size * 0.045} fill="#8A8478" fontFamily="system-ui">
          {active ? active.name : "Totale"}
        </text>
      </svg>
    </div>
  );
}

// ----- Grafico a barre, anche con più serie affiancate (usato per report mensili, top 3, andamento annuale) -----
function SimpleBarChart({ data, bars, height = 200, xKey = "label" }) {
  // bars: [{ dataKey, color, name }]
  const [activeIdx, setActiveIdx] = useState(null);
  if (!data || data.length === 0) {
    return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: "#B8B2A8", fontSize: 13 }}>Nessun dato</div>;
  }

  const padding = { top: 10, right: 10, bottom: 24, left: 36 };
  const width = 320; // viewBox virtuale, si adatta al contenitore con preserveAspectRatio
  const plotW = width - padding.left - padding.right;
  const plotH = height - padding.top - padding.bottom;

  const maxVal = Math.max(1, ...data.flatMap((d) => bars.map((b) => d[b.dataKey] || 0)));
  const yTicks = 4;

  const groupW = plotW / data.length;
  const barGap = 3;
  const barW = Math.max(2, (groupW - barGap * (bars.length + 1)) / bars.length);

  return (
    <div style={{ position: "relative" }}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ display: "block", overflow: "visible" }}>
        {/* Griglia orizzontale */}
        {Array.from({ length: yTicks + 1 }, (_, i) => {
          const y = padding.top + (plotH / yTicks) * i;
          const val = maxVal - (maxVal / yTicks) * i;
          return (
            <g key={i}>
              <line x1={padding.left} x2={width - padding.right} y1={y} y2={y} stroke="#F1EDE6" strokeWidth="1" />
              <text x={padding.left - 6} y={y + 3} textAnchor="end" fontSize="7" fill="#8A8478" fontFamily="system-ui">{formatEURShort(val)}</text>
            </g>
          );
        })}

        {/* Barre */}
        {data.map((d, di) => {
          const groupX = padding.left + groupW * di;
          return (
            <g key={di}>
              {bars.map((b, bi) => {
                const val = d[b.dataKey] || 0;
                const barH = (val / maxVal) * plotH;
                const x = groupX + barGap + bi * (barW + barGap);
                const y = padding.top + plotH - barH;
                const isActive = activeIdx && activeIdx.di === di && activeIdx.bi === bi;
                return (
                  <rect
                    key={bi}
                    x={x} y={y} width={barW} height={Math.max(0, barH)}
                    fill={b.color} rx="2" opacity={activeIdx && !isActive ? 0.5 : 1}
                    onClick={() => setActiveIdx(isActive ? null : { di, bi })}
                    style={{ cursor: "pointer", transition: "opacity 0.15s" }}
                  />
                );
              })}
              <text x={groupX + groupW / 2} y={height - 6} textAnchor="middle" fontSize="7" fill="#8A8478" fontFamily="system-ui">
                {String(d[xKey]).slice(0, 6)}
              </text>
            </g>
          );
        })}
      </svg>
      {activeIdx && (
        <div style={{
          position: "absolute", top: 4, right: 4, background: "#fff", border: "1px solid #E8E2D6",
          borderRadius: 8, padding: "6px 10px", fontSize: 11, boxShadow: "0 2px 8px rgba(0,0,0,0.08)"
        }}>
          <div style={{ fontWeight: 700, color: bars[activeIdx.bi].color }}>{bars[activeIdx.bi].name || bars[activeIdx.bi].dataKey}</div>
          <div>{formatEUR(data[activeIdx.di][bars[activeIdx.bi].dataKey] || 0)}</div>
        </div>
      )}
    </div>
  );
}

// ----- Grafico a linee (usato per andamento stipendio, andamento categoria nel tempo) -----
function SimpleLineChart({ data, dataKey, color, height = 240, xKey = "label" }) {
  const [activeIdx, setActiveIdx] = useState(null);
  if (!data || data.length === 0) {
    return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: "#B8B2A8", fontSize: 13 }}>Nessun dato</div>;
  }

  const padding = { top: 14, right: 12, bottom: 24, left: 38 };
  const width = 320;
  const plotW = width - padding.left - padding.right;
  const plotH = height - padding.top - padding.bottom;

  const values = data.map((d) => d[dataKey] || 0);
  const maxVal = Math.max(1, ...values);
  const minVal = Math.min(0, ...values);
  const range = maxVal - minVal || 1;
  const yTicks = 4;

  const stepX = data.length > 1 ? plotW / (data.length - 1) : 0;
  const points = data.map((d, i) => {
    const x = padding.left + stepX * i;
    const y = padding.top + plotH - ((d[dataKey] - minVal) / range) * plotH;
    return { x, y, value: d[dataKey], label: d[xKey] };
  });

  const linePath = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
  const areaPath = `${linePath} L ${points[points.length - 1].x} ${padding.top + plotH} L ${points[0].x} ${padding.top + plotH} Z`;

  return (
    <div style={{ position: "relative" }}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ display: "block", overflow: "visible" }}>
        {Array.from({ length: yTicks + 1 }, (_, i) => {
          const y = padding.top + (plotH / yTicks) * i;
          const val = maxVal - (range / yTicks) * i;
          return (
            <g key={i}>
              <line x1={padding.left} x2={width - padding.right} y1={y} y2={y} stroke="#F1EDE6" strokeWidth="1" />
              <text x={padding.left - 6} y={y + 3} textAnchor="end" fontSize="7" fill="#8A8478" fontFamily="system-ui">{formatEURShort(val)}</text>
            </g>
          );
        })}

        <path d={areaPath} fill={color} opacity="0.08" stroke="none" />
        <path d={linePath} fill="none" stroke={color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" />

        {points.map((p, i) => (
          <circle
            key={i} cx={p.x} cy={p.y} r={activeIdx === i ? 5 : 3.2}
            fill={color} stroke="#fff" strokeWidth="1.5"
            onClick={() => setActiveIdx(activeIdx === i ? null : i)}
            style={{ cursor: "pointer" }}
          />
        ))}

        {points.map((p, i) => (
          <text key={i} x={p.x} y={height - 6} textAnchor="middle" fontSize="6.5" fill="#8A8478" fontFamily="system-ui">
            {data.length > 8 && i % 2 !== 0 ? "" : String(p.label).slice(0, 6)}
          </text>
        ))}
      </svg>
      {activeIdx !== null && (
        <div style={{
          position: "absolute", top: 4, right: 4, background: "#fff", border: "1px solid #E8E2D6",
          borderRadius: 8, padding: "6px 10px", fontSize: 11, boxShadow: "0 2px 8px rgba(0,0,0,0.08)"
        }}>
          <div style={{ fontWeight: 700, color }}>{points[activeIdx].label}</div>
          <div>{formatEUR(points[activeIdx].value)}</div>
        </div>
      )}
    </div>
  );
}

function formatEUR(n) {
  return new Intl.NumberFormat("it-IT", { style: "currency", currency: "EUR" }).format(n || 0);
}

function ymKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
}

const FREQ_LABELS = { weekly: "Ogni settimana", monthly: "Ogni mese", yearly: "Ogni anno" };

// Calcola la prossima occorrenza a partire da una data, sommando un periodo alla volta
// finché non è nel futuro (gestisce mesi di lunghezza diversa e anni bisestili).
function nextOccurrence(dateMs, freq) {
  const d = new Date(dateMs);
  if (freq === "weekly") d.setDate(d.getDate() + 7);
  else if (freq === "monthly") d.setMonth(d.getMonth() + 1);
  else if (freq === "yearly") d.setFullYear(d.getFullYear() + 1);
  return d.getTime();
}

// ---------- Storage ----------
const STORE_KEYS = {
  transactions: "transactions-v2",
  expenseCategories: "expense-categories-v2",
  incomeCategories: "income-categories-v2",
  recurring: "recurring-v1",
  backupSettings: "backup-settings-v1",
  legacyExpenses: "expenses-v1",
};

async function loadAll() {
  const out = {
    transactions: [],
    expenseCategories: DEFAULT_EXPENSE_CATEGORIES,
    incomeCategories: DEFAULT_INCOME_CATEGORIES,
    recurring: [],
    backupSettings: { frequency: "monthly", lastBackupAt: null },
  };
  try {
    const t = await localDB.get(STORE_KEYS.transactions);
    if (t && t.value) out.transactions = JSON.parse(t.value);
  } catch (_) {}
  try {
    const ec = await localDB.get(STORE_KEYS.expenseCategories);
    if (ec && ec.value) out.expenseCategories = JSON.parse(ec.value);
  } catch (_) {}
  try {
    const ic = await localDB.get(STORE_KEYS.incomeCategories);
    if (ic && ic.value) out.incomeCategories = JSON.parse(ic.value);
  } catch (_) {}
  try {
    const r = await localDB.get(STORE_KEYS.recurring);
    if (r && r.value) out.recurring = JSON.parse(r.value);
  } catch (_) {}
  try {
    const bs = await localDB.get(STORE_KEYS.backupSettings);
    if (bs && bs.value) out.backupSettings = { ...out.backupSettings, ...JSON.parse(bs.value) };
  } catch (_) {}

  if (out.transactions.length === 0) {
    try {
      const legacy = await localDB.get(STORE_KEYS.legacyExpenses);
      if (legacy && legacy.value) {
        const old = JSON.parse(legacy.value);
        if (Array.isArray(old) && old.length > 0) {
          out.transactions = old.map((e) => ({ ...e, type: "expense" }));
          await localDB.set(STORE_KEYS.transactions, JSON.stringify(out.transactions));
        }
      }
    } catch (_) {}
  }

  return out;
}

async function saveTransactions(transactions) {
  try { await localDB.set(STORE_KEYS.transactions, JSON.stringify(transactions)); } catch (_) {}
}
async function saveExpenseCategories(categories) {
  try { await localDB.set(STORE_KEYS.expenseCategories, JSON.stringify(categories)); } catch (_) {}
}
async function saveIncomeCategories(categories) {
  try { await localDB.set(STORE_KEYS.incomeCategories, JSON.stringify(categories)); } catch (_) {}
}
async function saveRecurring(recurring) {
  try { await localDB.set(STORE_KEYS.recurring, JSON.stringify(recurring)); } catch (_) {}
}
async function saveBackupSettings(settings) {
  try { await localDB.set(STORE_KEYS.backupSettings, JSON.stringify(settings)); } catch (_) {}
}

function daysForFrequency(freq) {
  if (freq === "weekly") return 7;
  if (freq === "monthly") return 30;
  if (freq === "quarterly") return 90;
  return null; // "never"
}

// Costruisce l'oggetto di backup completo con tutti i dati dell'app.
function buildBackupPayload({ transactions, expenseCategories, incomeCategories, recurring, backupSettings }) {
  return {
    app: "spese-app",
    backupVersion: 1,
    exportedAt: new Date().toISOString(),
    transactions,
    expenseCategories,
    incomeCategories,
    recurring,
    backupSettings,
  };
}

function downloadBackupFile(payload) {
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `backup-spese-${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ---------- App ----------
function App() {
  const [ready, setReady] = useState(false);
  const [transactions, setTransactions] = useState([]);
  const [expenseCategories, setExpenseCategories] = useState(DEFAULT_EXPENSE_CATEGORIES);
  const [incomeCategories, setIncomeCategories] = useState(DEFAULT_INCOME_CATEGORIES);
  const [recurring, setRecurring] = useState([]);
  const [backupSettings, setBackupSettings] = useState({ frequency: "monthly", lastBackupAt: null });
  const [backupDue, setBackupDue] = useState(false);
  const [tab, setTab] = useState("add");
  const [toast, setToast] = useState(null);

  useEffect(() => {
    (async () => {
      let { transactions, expenseCategories, incomeCategories, recurring, backupSettings } = await loadAll();

      // Elabora le ricorrenze scadute: genera le transazioni mancanti e avanza nextDate.
      const now = Date.now();
      let addedCount = 0;
      const updatedRecurring = recurring.map((r) => {
        if (!r.active) return r;
        let nextDate = r.nextDate;
        let guard = 0; // evita loop infiniti se una ricorrenza è rimasta ferma per anni
        while (nextDate <= now && guard < 500 && (!r.endDate || nextDate <= r.endDate)) {
          transactions = [{
            id: uid(), createdAt: nextDate, amount: r.amount,
            categoryId: r.categoryId, type: r.type,
            note: r.note ? r.note : "", recurringId: r.id,
          }, ...transactions];
          addedCount++;
          nextDate = nextOccurrence(nextDate, r.freq);
          guard++;
        }
        // Se la prossima occorrenza supera la data di fine, la ricorrenza si disattiva da sola.
        const expired = r.endDate && nextDate > r.endDate;
        return { ...r, nextDate, active: expired ? false : r.active };
      });

      setTransactions(transactions);
      setExpenseCategories(expenseCategories);
      setIncomeCategories(incomeCategories);
      setRecurring(updatedRecurring);
      setBackupSettings(backupSettings);
      setReady(true);

      // Calcola se è il momento di ricordare un backup, in base alla frequenza scelta.
      const days = daysForFrequency(backupSettings.frequency);
      if (days !== null) {
        const last = backupSettings.lastBackupAt;
        const dueMs = (last || 0) + days * 24 * 60 * 60 * 1000;
        if (!last || Date.now() >= dueMs) setBackupDue(true);
      }

      if (addedCount > 0) {
        await saveTransactions(transactions);
        await saveRecurring(updatedRecurring);
      }
    })();
  }, []);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 1600);
  }

  async function addTransaction(tx) {
    const next = [{ ...tx, id: uid(), createdAt: tx.createdAt || Date.now() }, ...transactions];
    setTransactions(next);
    await saveTransactions(next);
    showToast(tx.type === "income" ? "Ingresso registrato" : "Spesa registrata");
  }

  async function deleteTransaction(id) {
    const next = transactions.filter((t) => t.id !== id);
    setTransactions(next);
    await saveTransactions(next);
  }

  async function updateExpenseCategories(next) {
    setExpenseCategories(next);
    await saveExpenseCategories(next);
  }
  async function updateIncomeCategories(next) {
    setIncomeCategories(next);
    await saveIncomeCategories(next);
  }

  async function addRecurring(r) {
    const next = [{ ...r, id: uid() }, ...recurring];
    setRecurring(next);
    await saveRecurring(next);
    showToast("Ricorrenza impostata");
  }
  async function updateRecurring(id, patch) {
    const next = recurring.map((r) => (r.id === id ? { ...r, ...patch } : r));
    setRecurring(next);
    await saveRecurring(next);
  }
  async function deleteRecurring(id) {
    const next = recurring.filter((r) => r.id !== id);
    setRecurring(next);
    await saveRecurring(next);
  }

  async function runBackupNow() {
    const payload = buildBackupPayload({ transactions, expenseCategories, incomeCategories, recurring, backupSettings });
    downloadBackupFile(payload);
    const next = { ...backupSettings, lastBackupAt: Date.now() };
    setBackupSettings(next);
    setBackupDue(false);
    await saveBackupSettings(next);
    showToast("Backup scaricato");
  }

  async function updateBackupFrequency(frequency) {
    const next = { ...backupSettings, frequency };
    setBackupSettings(next);
    await saveBackupSettings(next);
    const days = daysForFrequency(frequency);
    if (days === null) setBackupDue(false);
  }

  async function restoreFromBackup(payload) {
    // Validazione minima: deve avere almeno l'array delle transazioni.
    if (!payload || !Array.isArray(payload.transactions)) {
      showToast("File di backup non valido");
      return false;
    }
    const nextTransactions = payload.transactions;
    const nextExpenseCategories = Array.isArray(payload.expenseCategories) ? payload.expenseCategories : expenseCategories;
    const nextIncomeCategories = Array.isArray(payload.incomeCategories) ? payload.incomeCategories : incomeCategories;
    const nextRecurring = Array.isArray(payload.recurring) ? payload.recurring : recurring;

    setTransactions(nextTransactions);
    setExpenseCategories(nextExpenseCategories);
    setIncomeCategories(nextIncomeCategories);
    setRecurring(nextRecurring);

    await saveTransactions(nextTransactions);
    await saveExpenseCategories(nextExpenseCategories);
    await saveIncomeCategories(nextIncomeCategories);
    await saveRecurring(nextRecurring);

    showToast("Backup ripristinato");
    return true;
  }

  if (!ready) {
    return (
      <div style={{ background: PAPER, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: INK, fontFamily: "system-ui", opacity: 0.5 }}>Caricamento…</div>
      </div>
    );
  }

  return (
    <div style={{
      background: PAPER, minHeight: "100vh", fontFamily: "'Inter', system-ui, sans-serif",
      color: INK, display: "flex", flexDirection: "column"
    }}>
      <style>{`
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        button { font-family: inherit; cursor: pointer; }
        ::-webkit-scrollbar { display: none; }
      `}</style>

      <Header tab={tab} />

      <main style={{ flex: 1, maxWidth: 480, margin: "0 auto", width: "100%", padding: "0 16px 100px" }}>
        {tab === "add" && (
          <AddView
            expenseCategories={expenseCategories}
            incomeCategories={incomeCategories}
            onAdd={addTransaction}
            onEditExpenseCategories={updateExpenseCategories}
            onEditIncomeCategories={updateIncomeCategories}
            transactions={transactions}
          />
        )}
        {tab === "history" && (
          <HistoryView
            transactions={transactions}
            expenseCategories={expenseCategories}
            incomeCategories={incomeCategories}
            onDelete={deleteTransaction}
          />
        )}
        {tab === "report" && (
          <ReportView
            transactions={transactions}
            expenseCategories={expenseCategories}
            incomeCategories={incomeCategories}
          />
        )}
        {tab === "recurring" && (
          <RecurringView
            recurring={recurring}
            expenseCategories={expenseCategories}
            incomeCategories={incomeCategories}
            onAdd={addRecurring}
            onUpdate={updateRecurring}
            onDelete={deleteRecurring}
          />
        )}
        {tab === "settings" && (
          <SettingsView
            backupSettings={backupSettings}
            backupDue={backupDue}
            onRunBackup={runBackupNow}
            onChangeFrequency={updateBackupFrequency}
            onRestore={restoreFromBackup}
          />
        )}
      </main>

      <TabBar tab={tab} setTab={setTab} backupDue={backupDue} />

      {toast && (
        <div style={{
          position: "fixed", bottom: 88, left: "50%", transform: "translateX(-50%)",
          background: INK, color: PAPER, padding: "10px 20px", borderRadius: 999,
          fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", gap: 8,
          boxShadow: "0 8px 24px rgba(0,0,0,0.2)", zIndex: 50, animation: "fadeUp 0.25s ease"
        }}>
          <Check size={16} strokeWidth={3} /> {toast}
        </div>
      )}
      <style>{`@keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 8px);} to { opacity: 1; transform: translate(-50%, 0);} }`}</style>
    </div>
  );
}

function Header({ tab }) {
  const titles = { add: "Nuovo movimento", history: "Cronologia", report: "Report mensile", recurring: "Ricorrenti", settings: "Backup e impostazioni" };
  return (

// ---------- Tab: Aggiungi ----------
function AddView({
  expenseCategories, incomeCategories, onAdd,
  onEditExpenseCategories, onEditIncomeCategories, transactions
}) {
  const [type, setType] = useState("expense");
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [showManage, setShowManage] = useState(false);
  const [catId, setCatId] = useState(null); // null = nessuna categoria ancora scelta
  const [date, setDate] = useState(() => new Date().toISOString().slice(0, 10));

  const categories = type === "expense" ? expenseCategories : incomeCategories;

  // Cambiando tipo si riparte dalla scelta della categoria (il tastierino si richiude).
  useEffect(() => {
    setCatId(null);
    setAmount("");
  }, [type]);

  useEffect(() => {
    if (catId && !categories.find((c) => c.id === catId)) setCatId(null);
  }, [categories]);

  const todayNet = useMemo(() => {
    const today = new Date().toDateString();
    return transactions
      .filter((t) => new Date(t.createdAt).toDateString() === today)
      .reduce((s, t) => s + (t.type === "income" ? t.amount : -t.amount), 0);
  }, [transactions]);

  function pressKey(k) {
    if (k === "back") { setAmount((a) => a.slice(0, -1)); return; }
    if (k === "." && amount.includes(".")) return;
    if (amount.includes(".") && amount.split(".")[1]?.length >= 2) return;
    if (amount === "0" && k !== ".") { setAmount(k); return; }
    setAmount((a) => a + k);
  }

  function submit() {
    const val = parseFloat(amount);
    if (!val || val <= 0 || !catId || !date) return;
    // Usiamo mezzogiorno per evitare spiazzamenti di fuso orario sulla data scelta.
    const createdAt = new Date(date + "T12:00:00").getTime();
    onAdd({ amount: val, categoryId: catId, note: note.trim(), type, createdAt });
    setAmount("");
    setNote("");
    setCatId(null);
    setDate(new Date().toISOString().slice(0, 10));
  }

  const canSubmit = parseFloat(amount) > 0 && catId && date;
  const activeColor = type === "expense" ? EXPENSE_RED : INCOME_GREEN;

  return (
    <div>
      <div style={{
        background: todayNet >= 0 ? ACCENT_SOFT : "#FBEAE6", borderRadius: 16, padding: "10px 16px", marginBottom: 16,
        fontSize: 13, color: todayNet >= 0 ? ACCENT : "#B5473A", fontWeight: 600, display: "flex", justifyContent: "space-between"
      }}>
        <span>Saldo di oggi</span>
        <span>{todayNet >= 0 ? "+" : ""}{formatEUR(todayNet)}</span>
      </div>

      <div style={{
        display: "flex", background: "#F1EDE6", borderRadius: 14, padding: 4, marginBottom: 18
      }}>
        <button
          onClick={() => setType("expense")}
          style={{
            flex: 1, padding: "10px 0", borderRadius: 11, border: "none",
            background: type === "expense" ? "#fff" : "transparent",
            boxShadow: type === "expense" ? "0 2px 8px rgba(0,0,0,0.08)" : "none",
            color: type === "expense" ? EXPENSE_RED : "#8A8478",
            fontWeight: 700, fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
            transition: "all 0.15s"
          }}
        >
          <ArrowUpCircle size={16} /> Uscita
        </button>
        <button
          onClick={() => setType("income")}
          style={{
            flex: 1, padding: "10px 0", borderRadius: 11, border: "none",
            background: type === "income" ? "#fff" : "transparent",
            boxShadow: type === "income" ? "0 2px 8px rgba(0,0,0,0.08)" : "none",
            color: type === "income" ? INCOME_GREEN : "#8A8478",
            fontWeight: 700, fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
            transition: "all 0.15s"
          }}
        >
          <ArrowDownCircle size={16} /> Ingresso
        </button>
      </div>

      {/* Data */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
        <Calendar size={16} color="#8A8478" style={{ flexShrink: 0 }} />
        <input
          type="date"
          value={date}
          onChange={(e) => setDate(e.target.value)}
          max={new Date().toISOString().slice(0, 10)}
          style={{
            flex: 1, padding: "10px 12px", borderRadius: 12, border: "1.5px solid #E8E2D6",
            fontSize: 14, background: "#fff", color: INK
          }}
        />
      </div>

      {/* Categorie */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
        <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "#8A8478" }}>
          Categoria
        </div>
        <button onClick={() => setShowManage(true)} style={{
          background: "none", border: "none", color: "#8A8478", display: "flex", alignItems: "center", gap: 4, fontSize: 12, padding: 4
        }}>
          <Settings2 size={14} /> Modifica
        </button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: catId ? 18 : 4 }}>
        {categories.map((c) => {
          const Icon = ICONS[c.icon] || MoreHorizontal;
          const active = catId === c.id;
          return (
            <button
              key={c.id}
              onClick={() => setCatId(c.id)}
              style={{
                display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                padding: "10px 4px", borderRadius: 14,
                border: active ? `2px solid ${c.color}` : "2px solid transparent",
                background: active ? `${c.color}1A` : "#F1EDE6",
                transition: "all 0.15s"
              }}
            >
              <Icon size={20} color={active ? c.color : "#8A8478"} />
              <span style={{ fontSize: 11, fontWeight: 600, color: active ? INK : "#8A8478" }}>{c.label}</span>
            </button>
          );
        })}
      </div>

      {/* Il tastierino compare come pannello che sale dal basso, appena scelta la categoria */}
      {catId && (
        <AmountSheet
          type={type}
          amount={amount}
          note={note}
          onPressKey={pressKey}
          onNoteChange={setNote}
          onSubmit={submit}
          onClose={() => setCatId(null)}
          canSubmit={canSubmit}
          activeColor={activeColor}
        />
      )}

      {showManage && (
        <CategoryManager
          expenseCategories={expenseCategories}
          incomeCategories={incomeCategories}
          initialTab={type}
          onSaveExpense={onEditExpenseCategories}
          onSaveIncome={onEditIncomeCategories}
          onClose={() => setShowManage(false)}
        />
      )}
    </div>
  );
}

function CategoryManager({
  expenseCategories, incomeCategories, initialTab,
  onSaveExpense, onSaveIncome, onClose
}) {
  const [manageType, setManageType] = useState(initialTab || "expense");
  const [expList, setExpList] = useState(expenseCategories.map((c) => ({ ...c })));
  const [incList, setIncList] = useState(incomeCategories.map((c) => ({ ...c })));
  const [newLabel, setNewLabel] = useState("");
  const [newIcon, setNewIcon] = useState("MoreHorizontal");
  const [pickerFor, setPickerFor] = useState(null); // id categoria esistente in modifica, o "new" per quella nuova

  const list = manageType === "expense" ? expList : incList;
  const setList = manageType === "expense" ? setExpList : setIncList;
  const accentColor = manageType === "expense" ? EXPENSE_RED : INCOME_GREEN;

  function updateLabel(id, label) {
    setList((l) => l.map((c) => (c.id === id ? { ...c, label } : c)));
  }
  function updateIcon(id, icon) {
    setList((l) => l.map((c) => (c.id === id ? { ...c, icon } : c)));
    setPickerFor(null);
  }
  function remove(id) {
    setList((l) => l.filter((c) => c.id !== id));
  }
  function addNew() {
    if (!newLabel.trim()) return;
    setList((l) => [...l, { id: uid(), label: newLabel.trim(), icon: newIcon, color: "#6B7280" }]);
    setNewLabel("");
    setNewIcon("MoreHorizontal");
  }

  function saveAll() {
    onSaveExpense(expList);
    onSaveIncome(incList);
    onClose();
  }

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex",
      alignItems: "flex-end", zIndex: 100
    }}>
      <div style={{
        background: PAPER, width: "100%", maxHeight: "85vh", overflowY: "auto",
        borderRadius: "20px 20px 0 0", padding: 20
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 20, margin: 0 }}>Categorie</h2>
          <button onClick={onClose} style={{ background: "#F1EDE6", border: "none", borderRadius: "50%", width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <X size={16} />
          </button>
        </div>

        <div style={{ display: "flex", background: "#F1EDE6", borderRadius: 14, padding: 4, marginBottom: 16 }}>
          <button
            onClick={() => setManageType("expense")}
            style={{
              flex: 1, padding: "9px 0", borderRadius: 11, border: "none",
              background: manageType === "expense" ? "#fff" : "transparent",
              color: manageType === "expense" ? EXPENSE_RED : "#8A8478", fontWeight: 700, fontSize: 13
            }}
          >
            Uscite
          </button>
          <button
            onClick={() => setManageType("income")}
            style={{
              flex: 1, padding: "9px 0", borderRadius: 11, border: "none",
              background: manageType === "income" ? "#fff" : "transparent",
              color: manageType === "income" ? INCOME_GREEN : "#8A8478", fontWeight: 700, fontSize: 13
            }}
          >
            Ingressi
          </button>
        </div>

        {list.map((c) => {
          const Icon = ICONS[c.icon] || MoreHorizontal;
          return (
            <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <button
                onClick={() => setPickerFor(c.id)}
                style={{ width: 32, height: 32, borderRadius: 10, background: `${c.color}22`, border: "none", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, cursor: "pointer" }}
              >
                <Icon size={16} color={c.color} />
              </button>
              <input
                value={c.label}
                onChange={(e) => updateLabel(c.id, e.target.value)}
                style={{ flex: 1, padding: "8px 10px", borderRadius: 10, border: "1.5px solid #E8E2D6", fontSize: 14 }}
              />
              <button onClick={() => remove(c.id)} style={{ background: "none", border: "none", color: "#C4453A", padding: 6 }}>
                <Trash2 size={16} />
              </button>
            </div>
          );
        })}

        <div style={{ display: "flex", gap: 8, marginTop: 14, alignItems: "center" }}>
          <button
            onClick={() => setPickerFor("new")}
            style={{ width: 40, height: 40, borderRadius: 10, background: `${accentColor}1A`, border: "none", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, cursor: "pointer" }}
          >
            {React.createElement(ICONS[newIcon] || MoreHorizontal, { size: 18, color: accentColor })}
          </button>
          <input
            value={newLabel}
            onChange={(e) => setNewLabel(e.target.value)}
            placeholder={manageType === "expense" ? "Nuova categoria di uscita" : "Nuova categoria di ingresso"}
            style={{ flex: 1, padding: "10px 12px", borderRadius: 10, border: "1.5px solid #E8E2D6", fontSize: 14 }}
          />
          <button onClick={addNew} style={{ background: `${accentColor}1A`, color: accentColor, border: "none", borderRadius: 10, padding: "0 14px", height: 40, fontWeight: 700 }}>
            <Plus size={16} />
          </button>
        </div>

        <button
          onClick={saveAll}
          style={{ width: "100%", marginTop: 18, padding: 14, borderRadius: 14, border: "none", background: INK, color: "#fff", fontWeight: 700, fontSize: 15 }}
        >
          Salva
        </button>
      </div>

      {pickerFor && (
        <IconPicker
          currentIcon={pickerFor === "new" ? newIcon : (list.find((c) => c.id === pickerFor)?.icon || "MoreHorizontal")}
          accentColor={accentColor}
          onPick={(iconName) => {
            if (pickerFor === "new") { setNewIcon(iconName); setPickerFor(null); }
            else updateIcon(pickerFor, iconName);
          }}
          onClose={() => setPickerFor(null)}
        />
      )}
    </div>
  );
}

// ---------- Tab: Cronologia ----------
function HistoryView({ transactions, expenseCategories, incomeCategories, onDelete }) {
  const catMap = useMemo(() => {
    const m = {};
    for (const c of expenseCategories) m[`expense:${c.id}`] = c;
    for (const c of incomeCategories) m[`income:${c.id}`] = c;
    return m;
  }, [expenseCategories, incomeCategories]);

  const grouped = useMemo(() => {
    const sorted = [...transactions].sort((a, b) => b.createdAt - a.createdAt);
    const g = {};
    const order = [];
    for (const t of sorted) {
      const d = new Date(t.createdAt);
      const dayKey = d.toDateString(); // univoca per giorno/mese/anno
      if (!g[dayKey]) {
        g[dayKey] = { label: d.toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long", year: "numeric" }), items: [] };
        order.push(dayKey);
      }
      g[dayKey].items.push(t);
    }
    return order.map((k) => g[k]);
  }, [transactions]);

  if (transactions.length === 0) {
    return (
      <EmptyState
        title="Nessun movimento ancora"
        subtitle="Le spese e gli ingressi che registri compariranno qui, raggruppati per giorno."
      />
    );
  }

  return (
    <div>
      {grouped.map(({ label, items }) => {
        const dayNet = items.reduce((s, i) => s + (i.type === "income" ? i.amount : -i.amount), 0);
        return (
          <div key={label} style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 700, textTransform: "capitalize", color: "#8A8478", marginBottom: 8, display: "flex", justifyContent: "space-between" }}>
              <span>{label}</span>
              <span style={{ color: dayNet >= 0 ? ACCENT : "#B5473A" }}>{dayNet >= 0 ? "+" : ""}{formatEUR(dayNet)}</span>
            </div>
            {items.map((t) => {
              const c = catMap[`${t.type}:${t.categoryId}`] || { label: "Varie", color: "#6B7280", icon: "MoreHorizontal" };
              const Icon = ICONS[c.icon] || MoreHorizontal;
              const isIncome = t.type === "income";
              return (
                <div key={t.id} style={{
                  display: "flex", alignItems: "center", gap: 12, background: "#fff",
                  borderRadius: 14, padding: "12px 14px", marginBottom: 8
                }}>
                  <div style={{ width: 36, height: 36, borderRadius: 10, background: `${c.color}22`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <Icon size={17} color={c.color} />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", gap: 5 }}>
                      {c.label}
                      {t.recurringId && <Repeat size={11} color="#B8B2A8" />}
                    </div>
                    {t.note && <div style={{ fontSize: 12, color: "#8A8478", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{t.note}</div>}
                  </div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: isIncome ? INCOME_GREEN : EXPENSE_RED }}>
                    {isIncome ? "+" : "−"}{formatEUR(t.amount)}
                  </div>
                  <button onClick={() => onDelete(t.id)} style={{ background: "none", border: "none", color: "#C4453A", padding: 4, opacity: 0.6 }}>
                    <Trash2 size={15} />
                  </button>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function EmptyState({ title, subtitle }) {

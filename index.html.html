}

// ---------- Tab: Ricorrenti ----------
function RecurringView({ recurring, expenseCategories, incomeCategories, onAdd, onUpdate, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null); // ricorrenza in modifica, o null per una nuova

  const catMap = useMemo(() => {
    const m = {};
    for (const c of expenseCategories) m[`expense:${c.id}`] = c;
    for (const c of incomeCategories) m[`income:${c.id}`] = c;
    return m;
  }, [expenseCategories, incomeCategories]);

  const sorted = useMemo(
    () => [...recurring].sort((a, b) => a.nextDate - b.nextDate),
    [recurring]
  );

  function openNew() {
    setEditing(null);
    setShowForm(true);
  }
  function openEdit(r) {
    setEditing(r);
    setShowForm(true);
  }

  return (
    <div>
      <div style={{ fontSize: 13, color: "#8A8478", marginBottom: 16, lineHeight: 1.5 }}>
        Le ricorrenze si registrano da sole alla scadenza, ogni volta che apri l'app.
      </div>

      {sorted.length === 0 ? (
        <EmptyState
          title="Nessuna ricorrenza impostata"
          subtitle="Aggiungi l'affitto, lo stipendio o qualsiasi movimento che si ripete nel tempo."
        />
      ) : (
        sorted.map((r) => {
          const c = catMap[`${r.type}:${r.categoryId}`] || { label: "Varie", color: "#6B7280", icon: "MoreHorizontal" };
          const Icon = ICONS[c.icon] || MoreHorizontal;
          const isIncome = r.type === "income";
          const nextDateLabel = new Date(r.nextDate).toLocaleDateString("it-IT", { day: "numeric", month: "long", year: "numeric" });
          return (
            <div key={r.id} style={{
              background: "#fff", borderRadius: 14, padding: "12px 14px", marginBottom: 8,
              opacity: r.active ? 1 : 0.5
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 36, height: 36, borderRadius: 10, background: `${c.color}22`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <Icon size={17} color={c.color} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{c.label}{r.note ? ` · ${r.note}` : ""}</div>
                  <div style={{ fontSize: 12, color: "#8A8478" }}>
                    {FREQ_LABELS[r.freq]} · prossima: {nextDateLabel}
                  </div>
                  {r.endDate && (
                    <div style={{ fontSize: 11, color: "#B8B2A8" }}>
                      Fino al {new Date(r.endDate).toLocaleDateString("it-IT", { day: "numeric", month: "long", year: "numeric" })}
                    </div>
                  )}
                </div>
                <div style={{ fontSize: 15, fontWeight: 700, color: isIncome ? INCOME_GREEN : EXPENSE_RED }}>
                  {isIncome ? "+" : "−"}{formatEUR(r.amount)}
                </div>
              </div>
              <div style={{ display: "flex", gap: 6, marginTop: 10, justifyContent: "flex-end" }}>
                <button
                  onClick={() => onUpdate(r.id, { active: !r.active })}
                  style={{ background: "#F1EDE6", border: "none", borderRadius: 10, padding: "6px 10px", display: "flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 600, color: "#8A8478" }}
                >
                  {r.active ? <><Pause size={13} /> Sospendi</> : <><Play size={13} /> Riattiva</>}
                </button>
                <button
                  onClick={() => openEdit(r)}
                  style={{ background: "#F1EDE6", border: "none", borderRadius: 10, padding: "6px 10px", display: "flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 600, color: "#8A8478" }}
                >
                  <Pencil size={13} /> Modifica
                </button>
                <button
                  onClick={() => onDelete(r.id)}
                  style={{ background: "#FBEAE6", border: "none", borderRadius: 10, padding: "6px 10px", display: "flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 600, color: "#B5473A" }}
                >
                  <Trash2 size={13} /> Elimina
                </button>
              </div>
            </div>
          );
        })
      )}

      <button
        onClick={openNew}
        style={{
          width: "100%", marginTop: 8, padding: "14px", borderRadius: 16, border: `1.5px dashed #C9C2B4`,
          background: "transparent", color: "#8A8478", fontSize: 14, fontWeight: 700,
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8
        }}
      >
        <Plus size={17} /> Nuova ricorrenza
      </button>

      {showForm && (
        <RecurringForm
          initial={editing}
          expenseCategories={expenseCategories}
          incomeCategories={incomeCategories}
          onSave={(data) => {
            if (editing) onUpdate(editing.id, data);
            else onAdd(data);
            setShowForm(false);
          }}
          onClose={() => setShowForm(false)}
        />
      )}
    </div>
  );
}

function RecurringForm({ initial, expenseCategories, incomeCategories, onSave, onClose }) {
  const [type, setType] = useState(initial?.type || "expense");
  const [catId, setCatId] = useState(initial?.categoryId || null);
  const [amount, setAmount] = useState(initial ? String(initial.amount) : "");
  const [note, setNote] = useState(initial?.note || "");
  const [freq, setFreq] = useState(initial?.freq || "monthly");
  const [startDate, setStartDate] = useState(
    initial ? new Date(initial.nextDate).toISOString().slice(0, 10) : new Date().toISOString().slice(0, 10)
  );
  const [hasEndDate, setHasEndDate] = useState(!!initial?.endDate);
  const [endDate, setEndDate] = useState(
    initial?.endDate ? new Date(initial.endDate).toISOString().slice(0, 10) : ""
  );
  // In modifica, la categoria è già nota: si parte direttamente sui dettagli.
  const [showAmountSheet, setShowAmountSheet] = useState(!initial);

  const categories = type === "expense" ? expenseCategories : incomeCategories;

  useEffect(() => {
    if (catId && !categories.find((c) => c.id === catId)) setCatId(null);
  }, [categories]);

  function pressKey(k) {
    if (k === "back") { setAmount((a) => a.slice(0, -1)); return; }
    if (k === "." && amount.includes(".")) return;
    if (amount.includes(".") && amount.split(".")[1]?.length >= 2) return;
    if (amount === "0" && k !== ".") { setAmount(k); return; }
    setAmount((a) => a + k);
  }

  const accentColor = type === "expense" ? EXPENSE_RED : INCOME_GREEN;
  const canSave = parseFloat(amount) > 0 && catId && startDate
    && (!hasEndDate || (endDate && endDate >= startDate));

  function submit() {
    if (!canSave) return;
    const nextDate = new Date(startDate + "T12:00:00").getTime();
    const endDateMs = hasEndDate && endDate ? new Date(endDate + "T23:59:59").getTime() : null;
    onSave({
      type, amount: parseFloat(amount), categoryId: catId, note: note.trim(),
      freq, nextDate, endDate: endDateMs, active: true,
    });
  }

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex",
      alignItems: "flex-end", zIndex: 100
    }}>
      <div style={{
        background: PAPER, width: "100%", maxHeight: "88vh", overflowY: "auto",
        borderRadius: "20px 20px 0 0", padding: 20
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 20, margin: 0 }}>
            {initial ? "Modifica ricorrenza" : "Nuova ricorrenza"}
          </h2>
          <button onClick={onClose} style={{ background: "#F1EDE6", border: "none", borderRadius: "50%", width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <X size={16} />
          </button>
        </div>

        {/* Tipo */}
        <div style={{ display: "flex", background: "#F1EDE6", borderRadius: 14, padding: 4, marginBottom: 14 }}>
          <button
            onClick={() => { setType("expense"); setCatId(null); }}
            style={{
              flex: 1, padding: "9px 0", borderRadius: 11, border: "none",
              background: type === "expense" ? "#fff" : "transparent",
              color: type === "expense" ? EXPENSE_RED : "#8A8478", fontWeight: 700, fontSize: 13
            }}
          >
            Uscita
          </button>
          <button
            onClick={() => { setType("income"); setCatId(null); }}
            style={{
              flex: 1, padding: "9px 0", borderRadius: 11, border: "none",
              background: type === "income" ? "#fff" : "transparent",
              color: type === "income" ? INCOME_GREEN : "#8A8478", fontWeight: 700, fontSize: 13
            }}
          >
            Ingresso
          </button>
        </div>

        {/* Categoria: selezionandola si apre il tastierino per importo e nota */}
        <label style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "#8A8478" }}>Categoria</label>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, margin: "6px 0 14px" }}>
          {categories.map((c) => {
            const Icon = ICONS[c.icon] || MoreHorizontal;
            const active = catId === c.id;
            return (
              <button
                key={c.id}
                onClick={() => { setCatId(c.id); setShowAmountSheet(true); }}
                style={{
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 5,
                  padding: "9px 4px", borderRadius: 12,
                  border: active ? `2px solid ${c.color}` : "2px solid transparent",
                  background: active ? `${c.color}1A` : "#F1EDE6",
                }}
              >
                <Icon size={17} color={active ? c.color : "#8A8478"} />
                <span style={{ fontSize: 10, fontWeight: 600, color: active ? INK : "#8A8478" }}>{c.label}</span>
              </button>
            );
          })}
        </div>

        {/* Riepilogo importo scelto nel tastierino, con possibilità di riaprirlo */}
        {catId && (
          <button
            onClick={() => setShowAmountSheet(true)}
            style={{
              width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
              background: "#fff", border: "1.5px solid #E8E2D6", borderRadius: 12, padding: "12px 14px",
              marginBottom: 14
            }}
          >
            <span style={{ fontSize: 13, color: "#8A8478" }}>{note || "Importo e nota"}</span>
            <span style={{ fontSize: 16, fontWeight: 700, color: amount ? accentColor : "#B8B2A8", fontVariantNumeric: "tabular-nums" }}>
              {amount ? `${type === "expense" ? "−" : "+"}€${amount}` : "Imposta"}
            </span>
          </button>
        )}

        {/* Frequenza */}
        <label style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "#8A8478" }}>Frequenza</label>
        <div style={{ display: "flex", gap: 8, margin: "6px 0 14px" }}>
          {["weekly", "monthly", "yearly"].map((f) => (
            <button
              key={f}
              onClick={() => setFreq(f)}
              style={{
                flex: 1, padding: "10px 0", borderRadius: 12, border: "none",
                background: freq === f ? accentColor : "#F1EDE6",
                color: freq === f ? "#fff" : "#8A8478", fontWeight: 700, fontSize: 12
              }}
            >
              {f === "weekly" ? "Settimanale" : f === "monthly" ? "Mensile" : "Annuale"}
            </button>
          ))}
        </div>

        {/* Data di partenza */}
        <label style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "#8A8478" }}>
          {initial ? "Prossima scadenza" : "Prima scadenza"}
        </label>
        <input
          type="date"
          value={startDate}
          onChange={(e) => setStartDate(e.target.value)}
          style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: "1.5px solid #E8E2D6", fontSize: 14, margin: "6px 0 14px", background: "#fff" }}
        />

        {/* Data di fine (facoltativa) */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", margin: "0 0 6px" }}>
          <label style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "#8A8478" }}>
            Data di fine
          </label>
          <button
            onClick={() => { setHasEndDate((v) => !v); if (hasEndDate) setEndDate(""); }}
            style={{
              background: hasEndDate ? `${accentColor}1A` : "#F1EDE6", border: "none", borderRadius: 999,
              padding: "5px 12px", fontSize: 12, fontWeight: 700, color: hasEndDate ? accentColor : "#8A8478",
              display: "flex", alignItems: "center", gap: 5
            }}
          >
            {hasEndDate ? "Attiva" : "Nessuna"}
          </button>
        </div>
        {hasEndDate ? (
          <input
            type="date"
            value={endDate}
            min={startDate}
            onChange={(e) => setEndDate(e.target.value)}
            style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: "1.5px solid #E8E2D6", fontSize: 14, margin: "0 0 14px", background: "#fff" }}
          />
        ) : (
          <div style={{ fontSize: 12, color: "#B8B2A8", margin: "0 0 14px" }}>
            Continua a ripetersi indefinitamente finché non la sospendi o elimini.
          </div>
        )}

        <button
          onClick={submit}
          disabled={!canSave}
          style={{
            width: "100%", padding: 14, borderRadius: 14, border: "none",
            background: canSave ? accentColor : "#D8D2C6", color: "#fff", fontWeight: 700, fontSize: 15
          }}
        >
          {initial ? "Salva modifiche" : "Crea ricorrenza"}
        </button>
      </div>

      {showAmountSheet && catId && (
        <AmountSheet
          type={type}
          amount={amount}
          note={note}
          onPressKey={pressKey}
          onNoteChange={setNote}
          onSubmit={() => setShowAmountSheet(false)}
          onClose={() => setShowAmountSheet(false)}
          canSubmit={parseFloat(amount) > 0}
          activeColor={accentColor}
          submitLabel="Conferma importo"
          notePlaceholder="Es. Affitto casa (facoltativa)"
        />
      )}
    </div>
  );
}

// ---------- Tab: Report ----------
function ReportView({ transactions, expenseCategories, incomeCategories }) {
  const [reportMode, setReportMode] = useState("monthly"); // monthly | salary
  const [monthOffset, setMonthOffset] = useState(0);
  const [view, setView] = useState("expense");

  const refDate = useMemo(() => {
    const d = new Date();
    d.setMonth(d.getMonth() + monthOffset);
    return d;
  }, [monthOffset]);

  const monthKey = ymKey(refDate);
  const monthTx = useMemo(
    () => transactions.filter((t) => ymKey(new Date(t.createdAt)) === monthKey),
    [transactions, monthKey]
  );

  const monthExpenses = useMemo(() => monthTx.filter((t) => t.type === "expense"), [monthTx]);
  const monthIncomes = useMemo(() => monthTx.filter((t) => t.type === "income"), [monthTx]);

  const catMap = useMemo(() => Object.fromEntries(expenseCategories.map((c) => [c.id, c])), [expenseCategories]);
  const incCatMap = useMemo(() => Object.fromEntries(incomeCategories.map((c) => [c.id, c])), [incomeCategories]);

  const activeList = view === "expense" ? monthExpenses : monthIncomes;
  const activeCatMap = view === "expense" ? catMap : incCatMap;

  const byCategory = useMemo(() => {
    const m = {};
    for (const t of activeList) {
      m[t.categoryId] = (m[t.categoryId] || 0) + t.amount;
    }
    return Object.entries(m)
      .map(([id, value]) => ({ id, name: activeCatMap[id]?.label || "Varie", value, color: activeCatMap[id]?.color || "#6B7280" }))
      .sort((a, b) => b.value - a.value);
  }, [activeList, activeCatMap]);

  const daysInMonth = new Date(refDate.getFullYear(), refDate.getMonth() + 1, 0).getDate();
  const byDay = useMemo(() => {
    const arr = Array.from({ length: daysInMonth }, (_, i) => ({ day: i + 1, totale: 0 }));
    for (const t of activeList) {
      const d = new Date(t.createdAt).getDate();
      arr[d - 1].totale += t.amount;
    }
    return arr;
  }, [activeList, daysInMonth]);

  const totalExpense = monthExpenses.reduce((s, t) => s + t.amount, 0);
  const totalIncome = monthIncomes.reduce((s, t) => s + t.amount, 0);
  const net = totalIncome - totalExpense;
  const total = activeList.reduce((s, t) => s + t.amount, 0);

  const isCurrentMonth = new Date().getMonth() === refDate.getMonth() && new Date().getFullYear() === refDate.getFullYear();
  const daysPassedOrAll = Math.min(daysInMonth, isCurrentMonth ? new Date().getDate() : daysInMonth);
  const avgPerDay = total / (daysPassedOrAll || 1);
  const topCat = byCategory[0];
  const accentColor = view === "expense" ? EXPENSE_RED : INCOME_GREEN;

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 16, overflowX: "auto", paddingBottom: 2 }}>
        {[
          { id: "monthly", label: "Report mensile", icon: null, color: INK },
          { id: "salary", label: "Andamento stipendio", icon: TrendingUp, color: INCOME },
          { id: "top3", label: "Top 3 voci", icon: Trophy, color: EXPENSE_RED },
          { id: "byCategory", label: "Voce nel tempo", icon: TrendingUp, color: EXPENSE_RED },
        ].map((m) => {
          const Icon = m.icon;
          const active = reportMode === m.id;
          return (
            <button
              key={m.id}
              onClick={() => setReportMode(m.id)}
              style={{
                flexShrink: 0, padding: "9px 14px", borderRadius: 999, border: "none",
                background: active ? m.color : "#F1EDE6",
                color: active ? "#fff" : "#8A8478", fontWeight: 700, fontSize: 13,
                display: "flex", alignItems: "center", gap: 5, whiteSpace: "nowrap"
              }}
            >
              {Icon && <Icon size={14} />} {m.label}
            </button>
          );
        })}
      </div>

      {reportMode === "salary" ? (
        <SalaryTrendView transactions={transactions} incomeCategories={incomeCategories} />
      ) : reportMode === "top3" ? (
        <Top3View transactions={transactions} expenseCategories={expenseCategories} />
      ) : reportMode === "byCategory" ? (
        <CategoryTrendView transactions={transactions} expenseCategories={expenseCategories} incomeCategories={incomeCategories} />
      ) : (
      <>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
        <button onClick={() => setMonthOffset((m) => m - 1)} style={{ background: "#F1EDE6", border: "none", borderRadius: "50%", width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <ChevronLeft size={17} />
        </button>
        <div style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 600 }}>
          {MESI[refDate.getMonth()]} {refDate.getFullYear()}
        </div>
        <button
          onClick={() => setMonthOffset((m) => Math.min(0, m + 1))}
          disabled={monthOffset === 0}
          style={{ background: "#F1EDE6", border: "none", borderRadius: "50%", width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", opacity: monthOffset === 0 ? 0.35 : 1 }}
        >
          <ChevronRight size={17} />
        </button>
      </div>

      <div style={{
        background: net >= 0 ? ACCENT_SOFT : "#FBEAE6", borderRadius: 16, padding: "16px 18px", marginBottom: 14,
        display: "flex", justifyContent: "space-between", alignItems: "center"
      }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: net >= 0 ? ACCENT : "#B5473A" }}>Saldo netto</div>
          <div style={{ fontFamily: "'Fraunces', serif", fontSize: 24, fontWeight: 700, color: net >= 0 ? ACCENT : "#B5473A" }}>
            {net >= 0 ? "+" : ""}{formatEUR(net)}
          </div>
        </div>
        <div style={{ textAlign: "right", fontSize: 12 }}>
          <div style={{ color: INCOME_GREEN, fontWeight: 700 }}>+{formatEUR(totalIncome)}</div>
          <div style={{ color: EXPENSE_RED, fontWeight: 700 }}>−{formatEUR(totalExpense)}</div>
        </div>
      </div>

      <div style={{ display: "flex", background: "#F1EDE6", borderRadius: 14, padding: 4, marginBottom: 16 }}>
        <button
          onClick={() => setView("expense")}
          style={{
            flex: 1, padding: "9px 0", borderRadius: 11, border: "none",
            background: view === "expense" ? "#fff" : "transparent",
            color: view === "expense" ? EXPENSE_RED : "#8A8478", fontWeight: 700, fontSize: 13
          }}
        >
          Uscite
        </button>
        <button
          onClick={() => setView("income")}
          style={{
            flex: 1, padding: "9px 0", borderRadius: 11, border: "none",
            background: view === "income" ? "#fff" : "transparent",
            color: view === "income" ? INCOME_GREEN : "#8A8478", fontWeight: 700, fontSize: 13
          }}
        >
          Ingressi
        </button>
      </div>

      {activeList.length === 0 ? (
        <EmptyState
          title={view === "expense" ? "Nessuna uscita nel mese" : "Nessun ingresso nel mese"}
          subtitle="Cambia mese o registra un movimento."
        />
      ) : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 18 }}>
            <StatCard label="Totale" value={formatEUR(total)} accent={accentColor} />
            <StatCard label="Media/giorno" value={formatEUR(avgPerDay)} accent={CORAL} />
          </div>

          {topCat && (
            <div style={{ background: "#fff", borderRadius: 14, padding: "12px 16px", marginBottom: 18, display: "flex", alignItems: "center", gap: 10 }}>
              {view === "expense" ? <TrendingUp size={16} color={topCat.color} /> : <TrendingDown size={16} color={topCat.color} />}
              <div style={{ fontSize: 13 }}>
                Categoria principale: <strong>{topCat.name}</strong> ({formatEUR(topCat.value)}, {Math.round((topCat.value / total) * 100)}%)
              </div>
            </div>
          )}

          <SectionTitle>{view === "expense" ? "Uscite per categoria" : "Ingressi per categoria"}</SectionTitle>
          <div style={{ background: "#fff", borderRadius: 16, padding: "8px 8px 4px", marginBottom: 20 }}>
            <SimplePieChart data={byCategory} height={220} />
            <div style={{ padding: "0 12px 12px" }}>
              {byCategory.map((c) => (
                <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", fontSize: 13 }}>
                  <div style={{ width: 9, height: 9, borderRadius: 3, background: c.color }} />
                  <div style={{ flex: 1 }}>{c.name}</div>
                  <div style={{ fontWeight: 700 }}>{formatEUR(c.value)}</div>
                  <div style={{ color: "#8A8478", width: 40, textAlign: "right" }}>{Math.round((c.value / total) * 100)}%</div>
                </div>
              ))}
            </div>
          </div>

          <SectionTitle>Andamento nel mese</SectionTitle>
          <div style={{ background: "#fff", borderRadius: 16, padding: "16px 8px 8px" }}>
            <SimpleBarChart data={byDay} bars={[{ dataKey: "totale", color: accentColor, name: "Totale" }]} height={200} xKey="day" />
          </div>
        </>
      )}
      </>
      )}
    </div>
  );
}

// ---------- Sotto-report: Top 3 voci di spesa nei mesi ----------
function Top3View({ transactions, expenseCategories }) {
  const catMap = useMemo(() => Object.fromEntries(expenseCategories.map((c) => [c.id, c])), [expenseCategories]);

  const expenseTx = useMemo(() => transactions.filter((t) => t.type === "expense"), [transactions]);

  // Individua le 3 categorie con la spesa totale più alta su tutto lo storico,
  // così il confronto tra mesi resta coerente sulle stesse voci.
  const top3Ids = useMemo(() => {
    const totals = {};
    for (const t of expenseTx) totals[t.categoryId] = (totals[t.categoryId] || 0) + t.amount;
    return Object.entries(totals).sort(([, a], [, b]) => b - a).slice(0, 3).map(([id]) => id);
  }, [expenseTx]);

  // Ultimi 6 mesi disponibili (compreso quello corrente), in ordine cronologico.
  const monthKeys = useMemo(() => {
    const now = new Date();
    const keys = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      keys.push(ymKey(d));
    }
    return keys;
  }, []);

  const chartData = useMemo(() => {
    return monthKeys.map((key) => {
      const [y, m] = key.split("-");
      const row = { label: `${MESI[parseInt(m, 10) - 1].slice(0, 3)} '${y.slice(2)}` };
      for (const id of top3Ids) row[id] = 0;
      for (const t of expenseTx) {
        if (ymKey(new Date(t.createdAt)) === key && top3Ids.includes(t.categoryId)) {
          row[t.categoryId] += t.amount;
        }
      }
      return row;
    });
  }, [monthKeys, expenseTx, top3Ids]);

  if (top3Ids.length === 0) {
    return (
      <EmptyState
        title="Ancora nessuna uscita registrata"
        subtitle="Quando registri qualche spesa, qui comparirà il confronto tra le 3 categorie che pesano di più."
      />
    );
  }

  return (
    <div>
      <div style={{ fontSize: 13, color: "#8A8478", marginBottom: 16, lineHeight: 1.5 }}>
        Le 3 categorie di spesa più pesanti in assoluto, mese per mese negli ultimi 6 mesi.
      </div>

      <div style={{ display: "flex", gap: 14, marginBottom: 16, flexWrap: "wrap" }}>
        {top3Ids.map((id) => {
          const c = catMap[id] || { label: "Varie", color: "#6B7280" };
          return (
            <div key={id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
              <div style={{ width: 9, height: 9, borderRadius: 3, background: c.color }} />
              {c.label}
            </div>
          );
        })}
      </div>

      <div style={{ background: "#fff", borderRadius: 16, padding: "16px 8px 8px" }}>
        <SimpleBarChart
          data={chartData}
          bars={top3Ids.map((id) => ({ dataKey: id, color: catMap[id]?.color || "#6B7280", name: catMap[id]?.label || "Varie" }))}
          height={260}
        />
      </div>
    </div>
  );
}

// ---------- Sotto-report: andamento di una voce di spesa nel tempo ----------
function CategoryTrendView({ transactions, expenseCategories, incomeCategories }) {
  const allCategories = useMemo(
    () => [...expenseCategories.map((c) => ({ ...c, type: "expense" })), ...incomeCategories.map((c) => ({ ...c, type: "income" }))],
    [expenseCategories, incomeCategories]
  );
  const [selectedId, setSelectedId] = useState(expenseCategories[0]?.id || null);
  const [selectedType, setSelectedType] = useState("expense");

  useEffect(() => {
    if (!selectedId && allCategories.length > 0) {
      setSelectedId(allCategories[0].id);
      setSelectedType(allCategories[0].type);
    }
  }, [allCategories]);

  const selectedCat = allCategories.find((c) => c.id === selectedId && c.type === selectedType);

  const monthlyData = useMemo(() => {
    if (!selectedCat) return [];
    const tx = transactions.filter((t) => t.type === selectedType && t.categoryId === selectedId);
    if (tx.length === 0) return [];
    const byMonth = {};
    for (const t of tx) {
      const key = ymKey(new Date(t.createdAt));
      byMonth[key] = (byMonth[key] || 0) + t.amount;
    }
    return Object.entries(byMonth)
      .sort(([a], [b]) => (a < b ? -1 : 1))
      .map(([key, value]) => {
        const [y, m] = key.split("-");
        return { key, label: `${MESI[parseInt(m, 10) - 1].slice(0, 3)} '${y.slice(2)}`, value };
      });
  }, [transactions, selectedId, selectedType]);

  const yearlyData = useMemo(() => {
    if (!selectedCat) return [];
    const tx = transactions.filter((t) => t.type === selectedType && t.categoryId === selectedId);
    if (tx.length === 0) return [];
    const byYear = {};
    for (const t of tx) {
      const y = new Date(t.createdAt).getFullYear();
      byYear[y] = (byYear[y] || 0) + t.amount;
    }
    return Object.entries(byYear)
      .sort(([a], [b]) => (a < b ? -1 : 1))
      .map(([year, value]) => ({ year, value }));
  }, [transactions, selectedId, selectedType]);

  const total = monthlyData.reduce((s, m) => s + m.value, 0);
  const avg = monthlyData.length > 0 ? total / monthlyData.length : 0;
  const avgPerYear = yearlyData.length > 0 ? total / yearlyData.length : 0;
  const lineColor = selectedCat?.color || (selectedType === "expense" ? EXPENSE_RED : INCOME_GREEN);

  return (
    <div>
      <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "#8A8478", marginBottom: 8 }}>
        Scegli la voce
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 18, overflowX: "auto", paddingBottom: 2 }}>
        {allCategories.map((c) => {
          const Icon = ICONS[c.icon] || MoreHorizontal;
          const active = selectedId === c.id && selectedType === c.type;
          return (
            <button
              key={`${c.type}-${c.id}`}
              onClick={() => { setSelectedId(c.id); setSelectedType(c.type); }}
              style={{
                flexShrink: 0, display: "flex", alignItems: "center", gap: 6,
                padding: "8px 12px", borderRadius: 999,
                border: active ? `1.5px solid ${c.color}` : "1.5px solid transparent",
                background: active ? `${c.color}1A` : "#F1EDE6",
              }}
            >
              <Icon size={14} color={active ? c.color : "#8A8478"} />
              <span style={{ fontSize: 12, fontWeight: 600, color: active ? INK : "#8A8478", whiteSpace: "nowrap" }}>{c.label}</span>
            </button>
          );
        })}
      </div>

      {monthlyData.length === 0 ? (
        <EmptyState
          title="Nessun dato per questa voce"
          subtitle="Quando registri un movimento in questa categoria, comparirà qui il suo andamento mese per mese."
        />
      ) : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 18 }}>
            <StatCard label="Totale" value={formatEUR(total)} accent={lineColor} compact />
            <StatCard label="Media/mese" value={formatEUR(avg)} accent={CORAL} compact />
            <StatCard label="Media/anno" value={formatEUR(avgPerYear)} accent={lineColor} compact />
          </div>

          <SectionTitle>{selectedCat?.label} mese per mese</SectionTitle>
          <div style={{ background: "#fff", borderRadius: 16, padding: "16px 8px 8px", marginBottom: 20 }}>
            <SimpleLineChart data={monthlyData} dataKey="value" color={lineColor} height={240} />
          </div>

          <SectionTitle>{selectedCat?.label} per anno</SectionTitle>
          <div style={{ background: "#fff", borderRadius: 16, padding: "16px 8px 8px" }}>
            <SimpleBarChart data={yearlyData} bars={[{ dataKey: "value", color: lineColor, name: selectedCat?.label }]} height={200} xKey="year" />
          </div>
        </>
      )}
    </div>
  );
}

// ---------- Sotto-report: Andamento stipendio ----------
function SalaryTrendView({ transactions, incomeCategories }) {
  // Trova la categoria stipendio: preferisce l'id di default, altrimenti cerca per nome.
  const salaryCategory = useMemo(() => {
    return incomeCategories.find((c) => c.id === "stipendio")
      || incomeCategories.find((c) => c.label.trim().toLowerCase() === "stipendio")
      || null;
  }, [incomeCategories]);

  const monthlyData = useMemo(() => {
    if (!salaryCategory) return [];
    const salaryTx = transactions.filter((t) => t.type === "income" && t.categoryId === salaryCategory.id);
    if (salaryTx.length === 0) return [];

    const byMonth = {};
    for (const t of salaryTx) {
      const key = ymKey(new Date(t.createdAt));
      byMonth[key] = (byMonth[key] || 0) + t.amount;
    }
    return Object.entries(byMonth)
      .sort(([a], [b]) => (a < b ? -1 : 1))
      .map(([key, value]) => {
        const [y, m] = key.split("-");
        return { key, label: `${MESI[parseInt(m, 10) - 1].slice(0, 3)} '${y.slice(2)}`, value };
      });
  }, [transactions, salaryCategory]);

  if (!salaryCategory) {
    return (
      <EmptyState
        title="Categoria Stipendio non trovata"
        subtitle="Crea o rinomina una categoria di ingresso in 'Stipendio' dal pulsante Modifica nella schermata Aggiungi."
      />
    );
  }

  if (monthlyData.length === 0) {
    return (
      <EmptyState
        title="Ancora nessuno stipendio registrato"
        subtitle="Quando registri un ingresso nella categoria Stipendio, comparirà qui il suo andamento mese per mese."
      />
    );
  }

  const last = monthlyData[monthlyData.length - 1];
  const prev = monthlyData.length > 1 ? monthlyData[monthlyData.length - 2] : null;
  const delta = prev ? last.value - prev.value : 0;
  const deltaPct = prev && prev.value > 0 ? (delta / prev.value) * 100 : 0;

  const avg = monthlyData.reduce((s, m) => s + m.value, 0) / monthlyData.length;
  const first = monthlyData[0];
  const totalGrowth = first.value > 0 ? ((last.value - first.value) / first.value) * 100 : 0;

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
        <StatCard label="Ultimo stipendio" value={formatEUR(last.value)} accent={INCOME} />
        <StatCard label="Media storica" value={formatEUR(avg)} accent={CORAL} />
      </div>

      {prev && (
        <div style={{
          background: delta >= 0 ? INCOME_SOFT : "#FBEAE6", borderRadius: 14, padding: "12px 16px", marginBottom: 18,
          display: "flex", alignItems: "center", gap: 10
        }}>
          {delta >= 0 ? <TrendingUp size={16} color={INCOME} /> : <TrendingDown size={16} color="#B5473A" />}
          <div style={{ fontSize: 13, color: delta >= 0 ? INCOME : "#B5473A" }}>
            <strong>{delta >= 0 ? "+" : ""}{formatEUR(delta)}</strong> rispetto al mese precedente
            {prev.value > 0 && <> ({deltaPct >= 0 ? "+" : ""}{deltaPct.toFixed(1)}%)</>}
          </div>
        </div>
      )}

      {monthlyData.length > 1 && (
        <div style={{ background: "#fff", borderRadius: 14, padding: "12px 16px", marginBottom: 18, display: "flex", alignItems: "center", gap: 10 }}>
          <Briefcase size={16} color={INCOME} />
          <div style={{ fontSize: 13 }}>
            Crescita complessiva da {first.label} a {last.label}: <strong style={{ color: totalGrowth >= 0 ? INCOME : "#B5473A" }}>
              {totalGrowth >= 0 ? "+" : ""}{totalGrowth.toFixed(1)}%
            </strong>
          </div>
        </div>
      )}

      <SectionTitle>Stipendio mese per mese</SectionTitle>
      <div style={{ background: "#fff", borderRadius: 16, padding: "16px 8px 8px" }}>
        <SimpleLineChart data={monthlyData} dataKey="value" color={INCOME} height={240} />
      </div>
    </div>
  );
}

function StatCard({ label, value, accent, compact }) {
  return (
    <div style={{ background: "#fff", borderRadius: 14, padding: compact ? "12px 10px" : "14px 16px" }}>
      <div style={{ fontSize: compact ? 10 : 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "#8A8478", marginBottom: 4 }}>{label}</div>
      <div style={{ fontFamily: "'Fraunces', serif", fontSize: compact ? 17 : 22, fontWeight: 700, color: accent, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{value}</div>
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "#8A8478", marginBottom: 8, marginTop: 4 }}>
      {children}
    </div>
  );
}

// ---------- Tab bar ----------
// ---------- Tab: Impostazioni (backup) ----------
function SettingsView({ backupSettings, backupDue, onRunBackup, onChangeFrequency, onRestore }) {
  const [restoring, setRestoring] = useState(false);
  const [restoreError, setRestoreError] = useState("");
  const fileInputRef = React.useRef(null);

  const freqOptions = [
    { id: "never", label: "Mai" },
    { id: "weekly", label: "Ogni settimana" },
    { id: "monthly", label: "Ogni mese" },
    { id: "quarterly", label: "Ogni 3 mesi" },
  ];

  const lastBackupLabel = backupSettings.lastBackupAt
    ? new Date(backupSettings.lastBackupAt).toLocaleDateString("it-IT", { day: "numeric", month: "long", year: "numeric" })
    : "Mai eseguito";

  function handleFileChosen(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setRestoreError("");
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const payload = JSON.parse(reader.result);
        const ok = await onRestore(payload);
        if (!ok) setRestoreError("Il file non sembra un backup valido di questa app.");
        setRestoring(false);
      } catch (_) {
        setRestoreError("Impossibile leggere il file: assicurati sia il file di backup esportato dall'app.");
        setRestoring(false);
      }
    };
    reader.readAsText(file);
    e.target.value = ""; // permette di riselezionare lo stesso file in futuro
  }

  return (
    <div>
      {backupDue && (
        <div style={{
          background: "#FBEAE6", borderRadius: 16, padding: "14px 16px", marginBottom: 18,
          display: "flex", alignItems: "flex-start", gap: 10
        }}>
          <Calendar size={17} color={EXPENSE_RED} style={{ flexShrink: 0, marginTop: 1 }} />
          <div style={{ fontSize: 13, color: "#8A3A30", lineHeight: 1.5 }}>
            <strong>È ora di fare un backup.</strong> In base alla frequenza che hai scelto, è passato abbastanza tempo dall'ultimo salvataggio: scarica ora una copia dei tuoi dati.
          </div>
        </div>
      )}

      <SectionTitle>Backup manuale</SectionTitle>
      <div style={{ background: "#fff", borderRadius: 16, padding: "16px", marginBottom: 20 }}>
        <div style={{ fontSize: 13, color: "#8A8478", marginBottom: 4 }}>Ultimo backup</div>
        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 14 }}>{lastBackupLabel}</div>
        <div style={{ fontSize: 12, color: "#8A8478", lineHeight: 1.5, marginBottom: 14 }}>
          Scarica un file con tutte le tue spese, ingressi, categorie e ricorrenze. Tienilo al sicuro (email a te stesso, cloud personale, ecc.): è l'unico modo per recuperare i dati se cambi telefono o cancelli l'app.
        </div>
        <button
          onClick={onRunBackup}
          style={{
            width: "100%", padding: "14px", borderRadius: 14, border: "none",
            background: ACCENT, color: "#fff", fontWeight: 700, fontSize: 15,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8
          }}
        >
          <ArrowDownCircle size={18} /> Scarica backup ora
        </button>
      </div>

      <SectionTitle>Promemoria automatico</SectionTitle>
      <div style={{ background: "#fff", borderRadius: 16, padding: "16px", marginBottom: 20 }}>
        <div style={{ fontSize: 12, color: "#8A8478", lineHeight: 1.5, marginBottom: 14 }}>
          L'app non può salvare file da sola: ogni volta che la apri, se è passato il tempo che scegli qui, ti verrà segnalato un promemoria per scaricare il backup con un tap.
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {freqOptions.map((f) => {
            const active = backupSettings.frequency === f.id;
            return (
              <button
                key={f.id}
                onClick={() => onChangeFrequency(f.id)}
                style={{
                  padding: "12px 0", borderRadius: 12, border: "none",
                  background: active ? ACCENT : "#F1EDE6",
                  color: active ? "#fff" : "#8A8478", fontWeight: 700, fontSize: 13
                }}
              >
                {f.label}
              </button>
            );
          })}
        </div>
      </div>

      <SectionTitle>Ripristina da backup</SectionTitle>
      <div style={{ background: "#fff", borderRadius: 16, padding: "16px", marginBottom: 20 }}>
        <div style={{ fontSize: 12, color: "#8A8478", lineHeight: 1.5, marginBottom: 14 }}>
          Carica un file di backup esportato in precedenza. <strong>Attenzione:</strong> sostituirà tutti i dati attuali dell'app su questo dispositivo.
        </div>
        <input
          ref={fileInputRef}
          type="file"
          accept="application/json,.json"
          onChange={handleFileChosen}
          style={{ display: "none" }}
        />
        <button
          onClick={() => { setRestoreError(""); setRestoring(true); fileInputRef.current?.click(); }}
          style={{
            width: "100%", padding: "14px", borderRadius: 14, border: "1.5px solid #E8E2D6",
            background: "#fff", color: INK, fontWeight: 700, fontSize: 15,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8
          }}
        >
          <Repeat size={17} /> Scegli file di backup
        </button>
        {restoreError && (
          <div style={{ fontSize: 12, color: EXPENSE_RED, marginTop: 10, lineHeight: 1.5 }}>{restoreError}</div>
        )}
      </div>

      <div style={{ fontSize: 11, color: "#B8B2A8", textAlign: "center", lineHeight: 1.5, padding: "0 12px" }}>
        Tutti i tuoi dati restano solo su questo dispositivo. Il backup è l'unica copia di sicurezza: conservalo tu stesso in un posto affidabile.
      </div>
    </div>
  );
}

function TabBar({ tab, setTab, backupDue }) {
  const items = [
    { id: "add", label: "Aggiungi", icon: Plus },
    { id: "history", label: "Cronologia", icon: Calendar },
    { id: "recurring", label: "Ricorrenti", icon: Repeat },
    { id: "report", label: "Report", icon: TrendingUp },
    { id: "settings", label: "Backup", icon: Settings2 },
  ];
  return (
    <div style={{
      position: "fixed", bottom: 0, left: 0, right: 0, background: "#fff",
      borderTop: "1px solid #EFEAE1", display: "flex", justifyContent: "center",
      paddingBottom: "env(safe-area-inset-bottom, 0px)", zIndex: 40
    }}>
      <div style={{ display: "flex", width: "100%", maxWidth: 480 }}>
        {items.map((it) => {
          const Icon = it.icon;
          const active = tab === it.id;
          return (
            <button
              key={it.id}
              onClick={() => setTab(it.id)}
              style={{
                flex: 1, background: "none", border: "none", padding: "10px 0 8px",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                color: active ? ACCENT : "#B8B2A8", position: "relative"
              }}
            >
              <div style={{ position: "relative" }}>
                <Icon size={20} strokeWidth={active ? 2.5 : 2} />
                {it.id === "settings" && backupDue && (
                  <div style={{
                    position: "absolute", top: -2, right: -4, width: 8, height: 8,
                    borderRadius: "50%", background: EXPENSE_RED, border: "1.5px solid #fff"
                  }} />
                )}
              </div>
              <span style={{ fontSize: 10, fontWeight: 600 }}>{it.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ---------- Montaggio dell'app ----------
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

<script>
  // Nasconde il loader iniziale non appena React ha montato l'app.
  window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      const loader = document.getElementById("boot-loader");
      if (loader) loader.classList.add("hidden");
    }, 300);
  });

  // Registra un service worker minimale per abilitare l'uso offline una volta aperta la prima volta.
  if ("serviceWorker" in navigator) {
    const swCode = `
      self.addEventListener("fetch", () => {}); // no-op: basta la presenza per l'installabilità PWA
    `;
    const swBlob = new Blob([swCode], { type: "application/javascript" });
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
  }
</script>
